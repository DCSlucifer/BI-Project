<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">SuperstoreDW Star Schema</title>
  <desc id="desc">FactSales is the central fact table connected to date, product, customer, geography, and ship mode dimensions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px Segoe UI, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 14px Segoe UI, Arial, sans-serif; fill: #4b5563; }
      .fact { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2.5; rx: 12; ry: 12; }
      .dim { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 12; ry: 12; }
      .dim2 { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; ry: 12; }
      .dim3 { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; rx: 12; ry: 12; }
      .label { font: 700 16px Segoe UI, Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .small { font: 400 13px Segoe UI, Arial, sans-serif; fill: #374151; text-anchor: middle; }
      .arrow { stroke: #1f2937; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .note { font: 600 13px Segoe UI, Arial, sans-serif; fill: #374151; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="600" y="42" text-anchor="middle">SuperstoreDW Star Schema</text>
  <text class="subtitle" x="600" y="68" text-anchor="middle">FactSales stores order-line measures; dimensions provide descriptive context for OLAP and reporting.</text>

  <rect class="fact" x="470" y="260" width="260" height="230"/>
  <text class="label" x="600" y="294">FactSales</text>
  <text class="small" x="600" y="322">Grain: one order line</text>
  <text class="small" x="600" y="350">Sales, Quantity, Discount, Profit</text>
  <text class="small" x="600" y="378">DeliveryDays</text>
  <text class="small" x="600" y="406">OrderID as degenerate dimension</text>
  <text class="small" x="600" y="434">FKs to product, customer, geography,</text>
  <text class="small" x="600" y="456">ship mode, order date, and ship date</text>

  <rect class="dim" x="465" y="110" width="270" height="100"/>
  <text class="label" x="600" y="145">DimDate</text>
  <text class="small" x="600" y="170">DateKey, FullDate, Month, Quarter, Year</text>
  <text class="small" x="600" y="192">Role-playing: Order Date and Ship Date</text>

  <rect class="dim2" x="80" y="245" width="270" height="115"/>
  <text class="label" x="215" y="280">DimProduct</text>
  <text class="small" x="215" y="305">ProductID, ProductName</text>
  <text class="small" x="215" y="327">Sub-Category, Category</text>

  <rect class="dim3" x="850" y="245" width="270" height="115"/>
  <text class="label" x="985" y="280">DimCustomer</text>
  <text class="small" x="985" y="305">CustomerID, CustomerName</text>
  <text class="small" x="985" y="327">Segment</text>

  <rect class="dim2" x="80" y="520" width="270" height="125"/>
  <text class="label" x="215" y="555">DimShipMode</text>
  <text class="small" x="215" y="582">ShipMode</text>
  <text class="small" x="215" y="604">Shipping behavior context</text>

  <rect class="dim" x="850" y="520" width="270" height="125"/>
  <text class="label" x="985" y="555">DimGeography</text>
  <text class="small" x="985" y="582">Country, Region, State</text>
  <text class="small" x="985" y="604">City, PostalCode</text>

  <path class="arrow" d="M 600 210 L 600 260"/>
  <path class="arrow" d="M 350 302 L 470 350"/>
  <path class="arrow" d="M 850 302 L 730 350"/>
  <path class="arrow" d="M 350 582 L 470 445"/>
  <path class="arrow" d="M 850 582 L 730 445"/>

  <text class="note" x="600" y="525">FactSales is the required analytical fact table, not a temporary table.</text>
  <rect x="150" y="685" width="900" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="subtitle" x="600" y="710" text-anchor="middle">The star schema supports grouping, filtering, slicing, and drill-down across all reporting tools.</text>
</svg>
