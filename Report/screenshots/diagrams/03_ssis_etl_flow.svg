<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">SSIS ETL Flow for SuperstoreDW</title>
  <desc id="desc">SSIS loads CSV data into dbo.stg_Orders, then populates dimensions and FactSales with validation checks.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px Segoe UI, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 14px Segoe UI, Arial, sans-serif; fill: #4b5563; }
      .box { rx: 12; ry: 12; stroke-width: 2; }
      .source { fill: #fff7ed; stroke: #ea580c; }
      .landing { fill: #dbeafe; stroke: #2563eb; }
      .dim { fill: #ecfdf5; stroke: #059669; }
      .fact { fill: #fdf2f8; stroke: #db2777; }
      .process { fill: #eef2ff; stroke: #4f46e5; }
      .verify { fill: #ffffff; stroke: #64748b; }
      .label { font: 700 15px Segoe UI, Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .small { font: 400 12.5px Segoe UI, Arial, sans-serif; fill: #374151; text-anchor: middle; }
      .arrow { stroke: #1f2937; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="820"/>
  <text class="title" x="600" y="42" text-anchor="middle">SSIS ETL Flow</text>
  <text class="subtitle" x="600" y="68" text-anchor="middle">The landing table is internal to SuperstoreDW; dimensions and FactSales are loaded from the same database.</text>

  <rect class="box source" x="70" y="135" width="190" height="90"/>
  <text class="label" x="165" y="170">CSV Source</text>
  <text class="small" x="165" y="195">Sample - Superstore.csv</text>

  <rect class="box landing" x="330" y="125" width="230" height="110"/>
  <text class="label" x="445" y="160">dbo.stg_Orders</text>
  <text class="small" x="445" y="185">Internal landing table</text>
  <text class="small" x="445" y="207">9,994 raw rows</text>

  <rect class="box process" x="635" y="125" width="220" height="110"/>
  <text class="label" x="745" y="160">SQL Reset DW</text>
  <text class="small" x="745" y="185">Clear analytical tables</text>
  <text class="small" x="745" y="207">Prepare repeatable load</text>

  <rect class="box dim" x="80" y="330" width="185" height="85"/>
  <text class="label" x="172" y="363">DimProduct</text>
  <text class="small" x="172" y="388">Distinct product attributes</text>

  <rect class="box dim" x="300" y="330" width="185" height="85"/>
  <text class="label" x="392" y="363">DimCustomer</text>
  <text class="small" x="392" y="388">Distinct customers</text>

  <rect class="box dim" x="520" y="330" width="185" height="85"/>
  <text class="label" x="612" y="363">DimGeography</text>
  <text class="small" x="612" y="388">Region and location</text>

  <rect class="box dim" x="740" y="330" width="185" height="85"/>
  <text class="label" x="832" y="363">DimShipMode</text>
  <text class="small" x="832" y="388">Shipping mode values</text>

  <rect class="box dim" x="960" y="330" width="185" height="85"/>
  <text class="label" x="1052" y="363">DimDate</text>
  <text class="small" x="1052" y="388">Calendar script</text>

  <rect class="box process" x="310" y="520" width="220" height="90"/>
  <text class="label" x="420" y="553">Fact Source Rows</text>
  <text class="small" x="420" y="578">Read from stg_Orders</text>

  <rect class="box process" x="600" y="505" width="220" height="120"/>
  <text class="label" x="710" y="540">Surrogate Key Lookups</text>
  <text class="small" x="710" y="565">Product, Customer, Geography</text>
  <text class="small" x="710" y="587">Ship Mode, Order Date, Ship Date</text>

  <rect class="box process" x="890" y="520" width="210" height="90"/>
  <text class="label" x="995" y="553">Derived Column</text>
  <text class="small" x="995" y="578">DeliveryDays calculation</text>

  <rect class="box fact" x="495" y="685" width="230" height="92"/>
  <text class="label" x="610" y="720">FactSales</text>
  <text class="small" x="610" y="745">9,994 order-line facts</text>

  <rect class="box verify" x="845" y="690" width="240" height="82"/>
  <text class="label" x="965" y="722">sql/06_verify.sql</text>
  <text class="small" x="965" y="747">Totals and orphan-key checks</text>

  <path class="arrow" d="M 260 180 L 330 180"/>
  <path class="arrow" d="M 560 180 L 635 180"/>
  <path class="arrow" d="M 445 235 C 335 280 220 290 172 330"/>
  <path class="arrow" d="M 445 235 C 400 275 395 292 392 330"/>
  <path class="arrow" d="M 445 235 C 500 275 590 292 612 330"/>
  <path class="arrow" d="M 745 235 C 745 285 815 295 832 330"/>
  <path class="arrow" d="M 1052 415 C 990 465 820 480 710 505"/>
  <path class="arrow" d="M 445 235 C 400 360 395 465 420 520"/>
  <path class="arrow" d="M 530 565 L 600 565"/>
  <path class="arrow" d="M 820 565 L 890 565"/>
  <path class="arrow" d="M 995 610 C 925 680 785 720 725 730"/>
  <path class="arrow" d="M 710 625 C 690 660 655 675 610 685"/>
  <path class="arrow dash" d="M 445 235 C 505 625 735 720 845 725"/>
  <path class="arrow dash" d="M 725 730 L 845 730"/>
</svg>
