<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Data Mining Workflow</title>
  <desc id="desc">Decision Tree classification and K-Means RFM segmentation workflow for the Superstore dataset.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px Segoe UI, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 14px Segoe UI, Arial, sans-serif; fill: #4b5563; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; ry: 16; }
      .box { rx: 12; ry: 12; stroke-width: 2; }
      .source { fill: #fff7ed; stroke: #ea580c; }
      .prep { fill: #dbeafe; stroke: #2563eb; }
      .tree { fill: #ecfdf5; stroke: #059669; }
      .cluster { fill: #fdf2f8; stroke: #db2777; }
      .label { font: 700 15px Segoe UI, Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .small { font: 400 12.5px Segoe UI, Arial, sans-serif; fill: #374151; text-anchor: middle; }
      .panel-title { font: 700 17px Segoe UI, Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .arrow { stroke: #1f2937; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="600" y="42" text-anchor="middle">Data Mining Workflow</text>
  <text class="subtitle" x="600" y="68" text-anchor="middle">Supervised rule discovery for loss risk and unsupervised customer segmentation through RFM.</text>

  <rect class="box source" x="145" y="110" width="230" height="90"/>
  <text class="label" x="260" y="145">Sample - Superstore.csv</text>
  <text class="small" x="260" y="170">9,994 order-line records</text>

  <rect class="box prep" x="485" y="110" width="230" height="90"/>
  <text class="label" x="600" y="145">Preprocessing</text>
  <text class="small" x="600" y="170">Dates, targets, encoding, scaling</text>

  <path class="arrow" d="M 375 155 L 485 155"/>

  <rect class="panel" x="65" y="265" width="510" height="410"/>
  <text class="panel-title" x="320" y="303">Algorithm 1: Decision Tree Classification</text>
  <text class="subtitle" x="320" y="328" text-anchor="middle">Supervised model for interpretable loss-risk rules.</text>

  <rect class="box tree" x="105" y="365" width="180" height="70"/>
  <text class="label" x="195" y="392">Feature Set</text>
  <text class="small" x="195" y="414">Sales, Discount, Category...</text>
  <rect class="box tree" x="355" y="365" width="180" height="70"/>
  <text class="label" x="445" y="392">Train/Test Split</text>
  <text class="small" x="445" y="414">75/25 stratified</text>
  <rect class="box tree" x="105" y="500" width="180" height="70"/>
  <text class="label" x="195" y="527">Decision Tree</text>
  <text class="small" x="195" y="549">max_depth = 4</text>
  <rect class="box tree" x="355" y="500" width="180" height="70"/>
  <text class="label" x="445" y="527">Validation</text>
  <text class="small" x="445" y="549">CV + Random Forest benchmark</text>
  <rect class="box tree" x="155" y="610" width="330" height="45"/>
  <text class="small" x="320" y="637">Rule: Discount &gt; 0.25 and Category != Technology; precision 99.37%</text>

  <path class="arrow" d="M 285 400 L 355 400"/>
  <path class="arrow" d="M 445 435 C 445 470 250 470 195 500"/>
  <path class="arrow" d="M 285 535 L 355 535"/>
  <path class="arrow" d="M 445 570 L 380 610"/>

  <rect class="panel" x="625" y="265" width="510" height="410"/>
  <text class="panel-title" x="880" y="303">Algorithm 2: K-Means RFM Segmentation</text>
  <text class="subtitle" x="880" y="328" text-anchor="middle">Unsupervised segmentation based on customer behavior.</text>

  <rect class="box cluster" x="665" y="365" width="180" height="70"/>
  <text class="label" x="755" y="392">RFM Features</text>
  <text class="small" x="755" y="414">793 customers</text>
  <rect class="box cluster" x="915" y="365" width="180" height="70"/>
  <text class="label" x="1005" y="392">StandardScaler</text>
  <text class="small" x="1005" y="414">Comparable distance scale</text>
  <rect class="box cluster" x="665" y="500" width="180" height="70"/>
  <text class="label" x="755" y="527">k Selection</text>
  <text class="small" x="755" y="549">Elbow + Silhouette</text>
  <rect class="box cluster" x="915" y="500" width="180" height="70"/>
  <text class="label" x="1005" y="527">K-Means</text>
  <text class="small" x="1005" y="549">k = 4, random_state = 42</text>
  <rect class="box cluster" x="680" y="610" width="400" height="45"/>
  <text class="small" x="880" y="637">Stable labels: Active, Trung binh, VIP / Champions, Lost</text>

  <path class="arrow" d="M 845 400 L 915 400"/>
  <path class="arrow" d="M 1005 435 C 1005 470 810 470 755 500"/>
  <path class="arrow" d="M 845 535 L 915 535"/>
  <path class="arrow" d="M 1005 570 L 965 610"/>

  <path class="arrow" d="M 600 200 C 420 240 330 245 320 265"/>
  <path class="arrow" d="M 600 200 C 780 240 870 245 880 265"/>
</svg>
